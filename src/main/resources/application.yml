micronaut:
  application:
    name: petstore
  security:
    enabled: true
    authentication: basic
    intercept-url-map:
      - pattern: /swagger/**
        access:
          - isAnonymous()
      - pattern: /swagger-ui/**
        access:
          - isAnonymous()
  server:
    port: ${MICRONAUT_SERVER_PORT:8080}
  router:
    static-resources:
      swagger:
        enabled: true
        paths:
          - classpath:META-INF/swagger
        mapping:
          - /swagger/**
      swagger-ui:
        enabled: true
        mapping:
          - /swagger-ui/**
        paths:
          - classpath:META-INF/swagger/views/swagger-ui
